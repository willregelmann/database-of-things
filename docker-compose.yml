# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: collectibles_db
    environment:
      POSTGRES_DB: collectibles
      POSTGRES_USER: curator
      POSTGRES_PASSWORD: local_dev_only
    ports:
      - "5432:5432"
    volumes:
      # Auto-run all .sql files in schema/ on first start
      - ./schema:/docker-entrypoint-initdb.d
      # Persist data between restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curator -d collectibles"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for GUI access
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: collectibles_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Auto-configure server connection
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/tmp/pgpassfile:ro

volumes:
  postgres_data:
  pgadmin_data:
