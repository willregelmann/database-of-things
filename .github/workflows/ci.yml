name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server:
    name: MCP server build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run build

  collections-validate:
    name: Validate collections data
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/collections-validate
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/collections-validate/package-lock.json

      - run: npm ci
      - run: npm run validate
