name: POP MART
type: collection
description: >
  POP MART International Group Limited's line of designer blind-box vinyl
  figures and vinyl-plush hybrids, spanning dozens of artist-created IPs
  (The Monsters, Molly, Dimoo, Skullpanda, Crybaby, Hirono, Pucky, and
  more). Each IP releases its own "series" — a fixed set of regular designs
  sold as blind boxes alongside one secret/hidden chase design.
