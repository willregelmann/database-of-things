id: fb1430d4-7a3d-45f3-b3e9-f9535b2d55a4
name: Series 3
type: collection
description: >
  The third FireLink Dark Souls blind-box wave — six pre-painted PVC/ABS
  chibi figures, no duplicates in a full set of 6. Unlike Series 1 and 2
  (both produced by Emontoys), this wave is credited directly to the
  FireLink brand itself rather than a separate named studio. "Series 3" is
  an editorial label (see firelink/CLAUDE.md); Bandai Namco's own EU
  storefront instead labels this same wave "Volume 3." No official
  manufacturer-published series name exists.
date: "2024-02-08"
