id: ffd24ae6-831c-4cf0-b9b2-2d7ce5f495cc
name: Terrarium Collection
type: collection
description: >
  Re-Ment's flagship, longest-running Pokémon blind-box line — pre-painted
  figures posed in scenic dioramas inside clear PokéBall-shaped acrylic
  cases. Ongoing since 2017, roughly 1-2 mainline volumes per year, each a
  blind box of 6 designs. Only the mainline numbered volumes (1-15) are
  curated so far — Re-Ment has also released "EX" regional-themed volumes,
  a "DX" deluxe volume, and several unnumbered named specials under this
  same Terrarium Collection banner; those sub-lines aren't curated yet (see
  CLAUDE.md).
date: "2017-08-14"
