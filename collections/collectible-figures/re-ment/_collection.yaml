id: 6486043d-42f4-4158-9a72-a9b4f4489f7e
name: Re-Ment
type: collection
description: >
  A Japanese collectible-miniature manufacturer (est. 1998) best known for
  blind-box dioramas and figures across many licensed franchises. Only its
  Pokémon-licensed figure/diorama lines are curated here — Re-Ment also
  produces non-figure Pokémon merchandise (stationery, magnets, kitchen
  playsets, miniature food) that's out of scope for collectible-figures, and
  licenses many other franchises not yet curated at all.
