description: >
  The Pokémon Center's line of palm-sized, microbead-weighted plush that sit
  up on their own, released in Japan as "Pokémon fit" starting in 2018.
  Organized in numbered release series that each debut every Pokémon (and
  often every distinct form) from a given generation/region in a uniform
  style, rather than as one-off single-character releases.
