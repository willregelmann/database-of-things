name: "Platinum: Arceus"
type: collection
category: Trading Card Games
description: >
  The fourth and final expansion in the Platinum Series, released by The
  Pokémon Company International on November 4, 2009. Built around the
  Mythical Pokémon Arceus and its LV.X cards, it also introduced nine
  alternate-art Arceus cards (AR1-AR9) each depicting a different type, plus
  a small run of Shiny secret rares continuing the numbering line started in
  earlier Platinum Series sets.
