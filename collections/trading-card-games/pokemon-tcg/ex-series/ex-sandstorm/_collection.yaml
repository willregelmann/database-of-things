id: 75e0d8ad-b382-4db5-bffd-1b793f72b5b6
name: EX Sandstorm
type: collection
category: Trading Card Games
description: >
  The second expansion of the Pokémon Trading Card Game's EX Series, released
  September 18, 2003, continuing the Generation III (Ruby & Sapphire) roster
  and the Pokémon-ex mechanic introduced in the prior set. It was the first
  Pokémon USA expansion to ship with an affiliated Prerelease promo card,
  establishing the Prerelease event format used for subsequent releases.
  Spans 100 cards, including seven Pokémon-ex cards.
year: 2003
