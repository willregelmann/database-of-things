name: EX Legend Maker
type: collection
category: Trading Card Games
description: >
  The twelfth main expansion of the Pokémon Trading Card Game's EX Series,
  released in English on February 1, 2006. Set in the Mirage Forest, home to the
  elusive Mew, it continues the Delta Species mechanic and is best known for
  introducing three Gold Star (☆) cards — Regice, Regirock, and Registeel —
  alongside Pokémon-ex like Mew ex, Flygon ex, and Walrein ex.
