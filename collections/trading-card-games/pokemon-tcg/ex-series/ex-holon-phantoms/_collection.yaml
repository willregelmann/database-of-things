name: EX Holon Phantoms
type: collection
category: Trading Card Games
description: >
  The thirteenth main expansion of the Pokémon Trading Card Game's EX Series,
  released in English on May 3, 2006. Continuing the Delta Species mechanic
  into the mysterious "Holon" storyline, it introduced four Deoxys δ formes
  alongside Holon-themed Trainer cards (Holon Fossil, Holon Adventurer, Holon
  Lake) and three Gold Star (☆) cards — Gyarados ☆ δ, Mewtwo ☆, and Pikachu
  ☆ — plus a secret rare Mew numbered beyond the printed 110-card set.
year: 2006
total_cards: 110
