description: >
  The ninth EX-series expansion, released May 9, 2005 alongside the Pokémon
  Emerald video game. Featured Pokémon-ex for the Hoenn regional legendaries and
  the Regi trio, and was the first English-language expansion to include
  Holofoil Basic Energy cards, closing out its set list with six of them
  followed by a secret rare Farfetch'd.
