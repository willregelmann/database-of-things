name: EX Dragon
type: collection
category: Trading Card Games
description: >
  The third expansion in the Pokémon Trading Card Game's EX Series, released in
  English by Nintendo on November 24, 2003. The set spotlights Dragon-type and
  flying Pokémon such as Dragonite, Kingdra, and Salamence, continues the
  series' high-risk, high-reward Pokémon-ex cards, and introduced weather-themed
  Stadium cards. Its checklist spans 97 numbered cards plus 3 secret rares, most
  notably a secret rare Charizard.
date: "2003-11-24"
