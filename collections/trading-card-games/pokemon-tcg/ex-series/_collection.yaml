id: afdf9348-fe90-4b3a-81d1-feb78059e63e
name: EX Series
type: collection
category: Trading Card Games
description: >
  The first Pokémon Trading Card Game era distributed by Pokémon USA/
  Nintendo of America (through POP) after Wizards of the Coast lost the
  license. Introduced the Pokémon-ex mechanic — oversized-attack Pokémon
  worth 2 Prize cards when knocked out — and later the chase "Gold Star"
  cards. Spans EX Ruby & Sapphire through EX Power Keepers (2003-2007), 16
  expansions in total.
date: "2003-07-01"
