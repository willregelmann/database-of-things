category: Trading Card Games
description: >
  The fourteenth main expansion of the Pokémon Trading Card Game's EX Series,
  released in English on August 30, 2006. Spans 100 cards set on a
  crystal-touched island near Holon, marking the last expansion to feature
  the dual-typed Delta Species (δ) mechanic alongside Pokémon-ex, and
  introducing the ultra-rare Gold Star (☆) Alakazam and Celebi.
