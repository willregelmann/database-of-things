name: EX Hidden Legends
type: collection
category: Trading Card Games
description: >
  The fifth main Pokémon Trading Card Game expansion in the EX Series, released
  on June 1, 2004. Spans 101 numbered cards drawn largely from Hoenn's Ruby &
  Sapphire generation, introducing Pokémon-ex versions of the Legendary Titans
  Regirock, Regice, and Registeel alongside Groudon ex and Kyogre ex, and
  building an ancient-ruins theme through Trainer cards like Ancient Tomb,
  Desert Ruins, and Island Cave.
date: '2004-06-01'
