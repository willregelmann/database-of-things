id: 3db790d0-aed2-46f6-af63-723b0fefc5d9
name: EX Deoxys
type: collection
category: Trading Card Games
description: >
  The eighth main expansion of the Pokémon Trading Card Game's EX Series,
  released in English on February 14, 2005, timed to coincide with the home
  video release of the seventh Pokémon movie, Destiny Deoxys. Themed around the
  clash between Deoxys and Rayquaza, it continues the Pokémon-ex mechanic and
  the Gold Star (☆) card line introduced the prior year, adding ultra-rare
  Latias ☆, Latios ☆, and Rayquaza ☆. Spans 107 numbered cards plus a secret
  rare Rocket's Raikou ex.
date: "2005-02-14"
total_cards: 107
