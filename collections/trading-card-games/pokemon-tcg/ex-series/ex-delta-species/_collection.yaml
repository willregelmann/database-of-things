name: EX Delta Species
type: collection
category: Trading Card Games
description: >
  The eleventh main expansion of the Pokémon Trading Card Game's EX Series,
  released in English on October 31, 2005. It introduced the Delta Species (δ)
  mechanic — Pokémon whose type diverges from their species' usual type due to
  exposure at the Holon Research Tower — alongside dual-purpose Holon Energy
  cards, and includes three Gold Star (☆) cards: Groudon, Kyogre, and Metagross.
date: "2005-10-31"
