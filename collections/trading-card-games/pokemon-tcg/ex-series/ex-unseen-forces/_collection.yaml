description: >
  The tenth main expansion of the EX Series, released in English on August 22,
  2005, drawing on Pokémon Gold, Silver, and Crystal for its Generation I and
  II roster. It introduced the first Gold Star Pokémon cards — ultra-rare holo
  alternates for Entei, Raikou, and Suicune — and closed out the set with a
  secret subset covering all 28 Unown forms.
