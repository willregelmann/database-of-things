description: >
  The sixth main expansion of the Pokémon Trading Card Game's EX Series,
  released September 1, 2004 alongside the Pokémon FireRed and LeafGreen Game
  Boy Advance remakes. Its 112-card lineup is drawn entirely from Generation I's
  Kanto Pokémon, headlined by ex cards for the three Kanto starters' final
  evolutions plus four secret rares numbered beyond the printed total.
