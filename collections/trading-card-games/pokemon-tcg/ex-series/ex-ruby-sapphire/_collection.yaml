name: EX Ruby & Sapphire
type: collection
category: Trading Card Games
description: >
  The opening expansion of the EX Series, released July 1, 2003 as the first
  Pokémon TCG set distributed by Nintendo of America after Wizards of the
  Coast's license ended. Introduced the Pokémon-ex card type — Pokémon with
  higher HP and stronger attacks that concede two Prize cards when knocked out —
  and drew its 109 cards from the Generation III species and themes of the Ruby
  and Sapphire video games.
