name: Skyridge
type: collection
category: Trading Card Games
description: >
  The third and final e-Card Series expansion, published by Wizards of the
  Coast on May 12, 2003 — their last Pokémon TCG release before losing the
  license to Pokémon USA/Nintendo of America. Spans 144 cards, plus 32
  alternate Holo-foil printings of select Rares numbered on their own
  H1/H32 checklist, and 6 secret Crystal Pokémon (145/144-150/144): Celebi,
  Charizard, Crobat, Golem, Ho-oh, and Kabutops.
year: 2003
