id: 87e51a61-c1a0-42fe-83b2-9bbf098e7091
name: Wizards Black Star Promos
type: collection
category: Trading Card Games
description: >
  The first Pokémon Trading Card Game promotional card line, produced by Wizards
  of the Coast from July 1999 until they lost the TCG license in 2003. Spans 53
  cards distributed through Pokémon League events, movie theaters, magazines,
  and mail-in offers, marked with a black star in place of a set symbol.
  Numbering runs continuously across the Original Series, Neo Series, and e-Card
  Series eras without resetting per series, so unlike later promo lines it isn't
  scoped to any one series.
date: "1999"
total_cards: 53
