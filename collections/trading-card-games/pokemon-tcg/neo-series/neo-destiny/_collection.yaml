name: Neo Destiny
type: collection
category: Trading Card Games
description: >
  The fourth and final Neo Series expansion, published by Wizards of the
  Coast on February 28, 2002 — the last set released before Pokémon USA/
  Nintendo of America took over distribution with the EX Series. Spans 105
  cards themed around "Dark" and "Light" Pokémon, plus 8 secret Shining
  Pokémon (106/105-113/105): Celebi, Charizard, Kabutops, Mewtwo, Noctowl,
  Raichu, Steelix, and Tyranitar.
year: 2002
