description: >
  A special Pokémon Trading Card Game expansion released September 22, 2023,
  celebrating all 151 original Kanto Pokémon in Pokédex order. Adapted from
  the Japanese Pokémon Card 151 set, it introduced the Illustration Rare and
  Special Illustration Rare treatments for classic favorites like Charizard
  ex, Venusaur ex, and Mew ex, and was sold in dedicated 151-branded products
  rather than standard booster boxes.
