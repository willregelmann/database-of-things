description: >
  Released July 18, 2025, Black Bolt is one half of the first Western split
  expansion in the Pokémon Trading Card Game, paired with White Flare and
  returning focus to the Unova region's Generation V Pokémon. Zekrom ex
  headlines as the set's Black White Rare chase card, and the set introduces
  Poké Ball and Master Ball patterned parallel holofoils alongside a
  nostalgic Black & White Series-style Basic Energy card design.
