id: 0e788d6b-9d86-4bb7-b389-aed63e4e2f2e
name: Scarlet & Violet Series
type: collection
category: Trading Card Games
description: >
  Released alongside the Pokémon Scarlet and Violet games (Generation IX,
  Paldea region), introducing the Pokémon ex mechanic (a new, visually
  distinct white-art take on the name last used in 2003-2011), ACE SPEC
  cards, and a new rarity-tier vocabulary (Double Rare, Illustration Rare,
  Hyper Rare, and others) replacing the "Rare Holo <mechanic>" naming of
  prior series. Spans Scarlet & Violet through White Flare (2023-2025), 16
  expansions plus the Scarlet & Violet Energies support line and the SV
  Black Star Promos line.
