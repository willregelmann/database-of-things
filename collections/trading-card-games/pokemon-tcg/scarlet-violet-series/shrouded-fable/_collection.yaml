description: >
  A smaller-sized Scarlet & Violet expansion released by The Pokémon Company
  International on August 2, 2024, spanning 64 printed cards (99 including
  secret rares). It centers on the Mythical Pokémon Pecharunt and the Loyal
  Three—Okidogi, Munkidori, and Fezandipiti—introducing them to the TCG
  alongside a wave of Illustration Rare and ACE SPEC Rare cards.
