name: Scarlet & Violet
type: collection
category: Trading Card Games
description: >
  The debut expansion of the Pokémon Trading Card Game's Scarlet & Violet
  era, released on March 31, 2023, and based on the Generation IX video
  games. It introduced the Tera Pokémon ex mechanic, replacing V/VMAX as the
  set's headline card type, alongside Illustration Rare and Special
  Illustration Rare art treatments. The base set spans 198 cards, with
  additional secret rares bringing the print run to 258.
year: 2023
