name: Double Crisis
type: collection
category: Trading Card Games
description: >
  A 34-card special expansion released March 25, 2015, tying into Pokémon
  Omega Ruby and Alpha Sapphire's Team Aqua and Team Magma rivalry. Every
  Pokémon and Trainer card is a Team Aqua or Team Magma variant, and the set
  introduces the Double Aqua Energy and Double Magma Energy cards alongside
  full-art Rare Ultra Kyogre-EX and Groudon-EX.
date: "2015-03-25"
