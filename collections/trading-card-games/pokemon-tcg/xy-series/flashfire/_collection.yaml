description: >
  The second main expansion of the Pokémon Trading Card Game's XY Series,
  released on May 7, 2014. Flashfire introduced Mega Evolution Pokémon to the
  TCG for the first time, headlined by M Charizard-EX and M Kangaskhan-EX,
  alongside a 106-card set spanning Fire, Water, and Fighting-type Pokémon
  plus several secret rare cards beyond the standard numbering.
