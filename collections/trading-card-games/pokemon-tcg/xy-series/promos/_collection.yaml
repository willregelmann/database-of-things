name: XY Black Star Promos
type: collection
category: Trading Card Games
description: >
  Promotional cards distributed alongside the XY Series (2013-2017)
  through Pokémon League events, theme decks, and other promotions,
  marked with a black star and an "XY" number prefix. Spans 211 cards,
  numbered XY01-XY211 with no printed denominator — 5 further
  letter-suffixed numbers in this range (XY67a, XY150a, XY177a, XY198a,
  XY200a) belong to the separate "Yellow A Alternate cards" collection,
  not this promo line.
