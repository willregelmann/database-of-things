description: >
  The fourth main expansion of the XY Series, released in English on November
  5, 2014, and based on Pokémon X and Y. It introduced Mega Manectric-EX and
  Mega Gengar-EX alongside the Spirit Link Pokémon Tool cards, which let a
  Pokémon Mega Evolve without ending the player's turn, and carries a light
  Team Flare theme through its Hyper Gear Tool cards and character Supporters.
