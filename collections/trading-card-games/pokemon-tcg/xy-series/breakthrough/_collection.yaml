id: 2be728b3-bace-4987-819e-0e6eda78f55a
name: BREAKthrough
type: collection
category: Trading Card Games
description: >
  The eighth main expansion of the Pokémon Trading Card Game XY Series,
  released by The Pokémon Company International on November 4, 2015. It
  introduces the BREAK Evolution mechanic, in which a BREAK card is placed
  sideways atop an evolved Pokémon to grant new attacks and Abilities while
  retaining the Pokémon underneath, and closes with a pair of Mewtwo-EX
  secret rares.
year: 2015
total_cards: 162
