id: 14bf977b-c540-4b47-a6d4-0c8f3f3caa68
name: Kalos Starter Set
type: collection
category: Trading Card Games
description: >
  A 39-card starter/beginner product for the Pokémon Trading Card Game
  released on November 8, 2013, alongside the launch of the XY expansion.
  It introduced the Kalos region's starter Pokémon (Chespin, Fennekin, and
  Froakie lines) and their evolutions to new and returning players, and
  unlike standard expansions carries no rarity symbols on any of its cards.
