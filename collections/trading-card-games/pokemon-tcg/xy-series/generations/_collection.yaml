id: 64b6e032-6912-4e61-bfa3-1c2cd66e1dec
name: Generations
type: collection
category: Trading Card Games
description: >
  A special XY-series expansion released February 22, 2016, to celebrate the
  Pokémon franchise's 20th anniversary. Its 83-card main checklist reprints
  striking artwork of Kanto-focused Pokémon and 16 Pokémon-EX (including four
  Mega Evolutions), and it was distributed only through anniversary products
  like the Mythical Pokémon Collection rather than standard booster boxes. A
  32-card secret "Radiant Collection" subset (RC1-RC32) rounds out the set.
date: "2016-02-22"
total_cards: 83
