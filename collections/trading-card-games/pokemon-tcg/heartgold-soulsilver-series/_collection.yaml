id: c6e75cea-16fd-40d0-a021-2a51c3ddf299
name: HeartGold & SoulSilver Series
type: collection
category: Trading Card Games
description: >
  Released alongside the Pokémon HeartGold and SoulSilver remakes,
  revisiting Generation IV design with two new card mechanics: Pokémon
  Prime (souped-up reprints of earlier Pokémon) and LEGEND (Legendary
  Pokémon split across two physical cards that combine into one). Spans
  HeartGold & SoulSilver through Triumphant (2010), 4 expansions plus the
  HGSS Black Star Promos line.
