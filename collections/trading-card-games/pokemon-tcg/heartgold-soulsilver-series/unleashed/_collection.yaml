name: Unleashed
type: collection
category: Trading Card Games
description: >
  The second expansion in the HeartGold & SoulSilver Series, released on May
  12, 2010. Spans 95 cards centered on Generation II Pokémon and the
  legendary beasts Raikou, Entei, and Suicune, and introduced two new card
  mechanics: Pokémon Prime, evolved reprints with boosted attacks, and
  LEGEND cards, in which a Legendary Pokémon is split across two numbered
  cards played together as one.
