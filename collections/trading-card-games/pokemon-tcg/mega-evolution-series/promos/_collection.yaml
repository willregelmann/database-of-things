name: MEP Black Star Promos
type: collection
category: Trading Card Games
description: >
  Promotional cards distributed alongside the Mega Evolution Series
  (2025-present) through prereleases, blister packs, Elite Trainer Boxes,
  premium collections, and other promotions, marked with a black star and an
  "MEP" number prefix. Numbered 001-110 with no printed denominator (089, 090,
  091 reserved/unused) plus one unnumbered jumbo promo ("Pikachu at the
  Museum"); an ongoing, still-active line — 108 cards catalogued here so far,
  not a closed checklist.
