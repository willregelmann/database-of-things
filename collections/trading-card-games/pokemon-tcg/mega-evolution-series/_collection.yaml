id: b0c74f40-6eda-4622-9e48-6bace8156da0
name: Mega Evolution Series
type: collection
category: Trading Card Games
description: >
  Released alongside the return of Mega Evolution to the core Pokémon games,
  bringing Mega Pokémon back to the Trading Card Game for the first time
  since the 2015-2016 XY-era "M Pokémon-EX" cards, now as "Mega Pokémon ex."
  Continues most of the Scarlet & Violet Series' star-tier rarity system
  while adding two new top-tier values for the Mega Evolution mechanic
  itself. Spans Mega Evolution through Chaos Rising (2025-2026), 5
  expansions.
