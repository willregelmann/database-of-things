description: >
  The fifth expansion in the Pokémon Trading Card Game's Mega Evolution Series,
  released worldwide on July 17, 2026 — the English adaptation of the Japanese
  "Abyss Eye" set (May 22, 2026). Spans 84 printed cards plus secret rares for a
  total of 120, featuring six Mega Pokémon ex: Mega Delphox ex, Mega Zeraora ex,
  Mega Slowbro ex, Mega Chandelure ex, Mega Excadrill ex, and Mega Darkrai ex —
  the last as the set's sole Mega Hyper Rare and headline chase card.
