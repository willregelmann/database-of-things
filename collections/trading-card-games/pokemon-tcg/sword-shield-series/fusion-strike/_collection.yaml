id: f359458e-3c3b-45e6-9dcd-5b0833bb3c53
name: Fusion Strike
type: collection
category: Trading Card Games
description: >
  A Sword & Shield-era Pokémon Trading Card Game expansion released in English
  on November 12, 2021, following the Japanese Fusion Arts set. It introduced
  the Fusion Strike mechanic, a new strategic style alongside Single Strike
  and Rapid Strike, and is headlined by Mew V and Mew VMAX. The 264-card set
  is rounded out to 284 cards by a run of secret rares, making it the largest
  English-language Pokémon TCG set released up to that point.
date: "2021-11-12"
