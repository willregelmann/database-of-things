description: >
  The debut expansion of the Pokémon Trading Card Game's Sword & Shield
  Series, released February 7, 2020 alongside the Nintendo Switch Pokémon
  Sword and Shield video games. Set in the Galar region, it introduced the
  Pokémon V and VMAX card mechanics to the TCG. Spans 202 cards in the main
  checklist plus 14 secret rares numbered beyond the printed total.
