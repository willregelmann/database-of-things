name: Shining Fates
type: collection
category: Trading Card Games
description: >
  A Pokémon Trading Card Game expansion released in English on February 19,
  2021, built around a "Reveal A Shining Destiny!" theme spotlighting Shiny
  Pokémon. Alongside its 72-card main checklist of Pokémon V and VMAX cards,
  it includes the 122-card Shiny Vault, a secret sub-checklist devoted almost
  entirely to Shiny Pokémon in special embossed holofoil, headlined by Shiny
  Charizard VMAX.
