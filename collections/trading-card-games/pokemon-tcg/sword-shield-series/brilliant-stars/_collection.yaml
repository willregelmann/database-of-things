id: ae92685b-14a6-44bf-93df-1cab50bd2e95
name: Brilliant Stars
type: collection
category: Trading Card Games
description: >
  A Sword & Shield-era Pokémon Trading Card Game expansion released in English
  on February 25, 2022, based on Japan's Star Birth set. It introduced the
  Pokémon VSTAR mechanic, evolving from V Pokémon and granting a powerful
  one-per-game VSTAR Power, headlined by Charizard VSTAR. The 172-card set
  also debuts the Trainer Gallery, a 30-card alternate-art subset spotlighting
  Trainer cards and V/VMAX Pokémon, and is rounded out to 186 cards by a run
  of Rainbow and secret rares.
date: "2022-02-25"
total_cards: 172
