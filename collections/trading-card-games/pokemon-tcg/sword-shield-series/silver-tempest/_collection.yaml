name: Silver Tempest
type: collection
category: Trading Card Games
description: >
  The final main expansion of the Sword & Shield Series, released in English
  on November 11, 2022 (based on Japan's Paradigm Trigger). Headlined by Lugia
  VSTAR, it introduces new Pokémon VSTAR including Alolan Vulpix VSTAR, the
  first VSTAR Pokémon that isn't fully evolved, alongside Radiant Pokémon and
  VSTAR Powers debuting on Trainer cards. The 195-card base set is rounded out
  by Rainbow and secret rares, plus a 30-card Trainer Gallery alternate-art
  subset.
date: "2022-11-11"
