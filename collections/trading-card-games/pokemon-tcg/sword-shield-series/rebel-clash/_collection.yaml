name: Rebel Clash
type: collection
category: Trading Card Games
description: >
  The second main expansion of the Pokémon Trading Card Game's Sword & Shield
  series, released in English on May 1, 2020. It introduced Pokémon VMAX cards
  to the game for the first time, including the fully evolved forms of the
  Galar region's three starter Pokémon alongside Copperajah VMAX and Dragapult
  VMAX. The 192-card set is rounded out to 209 cards by a run of secret rares.
