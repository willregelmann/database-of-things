description: >
  A Pokémon Trading Card Game expansion released on August 27, 2021, as part
  of the Sword & Shield Series, spotlighting Eevee and its evolutions with a
  wave of Eeveelution V and VMAX cards. The set is especially prized by
  collectors for its extensive run of alternate-art secret rares, including
  Umbreon VMAX and Rayquaza VMAX, which remain among the most sought-after
  cards of the era.
