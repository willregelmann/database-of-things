name: Pokémon GO
type: collection
category: Trading Card Games
description: >
  A special Sword & Shield-series expansion released July 1, 2022, celebrating
  the Pokémon GO mobile game. Spans 78 printed cards (plus secret rares to
  #88) and features Radiant Venusaur, Charizard, and Blastoise alongside V,
  VMAX, and VSTAR Pokémon, plus Team Leader Supporter cards for Blanche,
  Candela, and Spark. Unlike most expansions, it was sold in the West through
  special-edition products rather than standard booster boxes.
year: 2022
