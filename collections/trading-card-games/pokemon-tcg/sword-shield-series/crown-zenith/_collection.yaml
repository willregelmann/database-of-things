description: >
  A special Pokémon Trading Card Game expansion released in English on January
  20, 2023, closing out the Sword & Shield Series. Sold through the Crown Zenith
  Elite Trainer Box and Premium Figure Collections rather than standard booster
  packs, it spans 159 numbered cards plus secret rares and features the
  "Galarian Gallery" subset of 70 alternate-art cards highlighting fan-favorite
  Pokémon and Trainers from across the era.
