category: Trading Card Games
description: >
  The second main expansion of the Diamond & Pearl Series, released on August 1,
  2007. Continued the Pokémon LV.X mechanic with Electivire, Lucario, and
  Magmortar, introduced Pokémon holding items and new Fossil cards, and featured
  the lake guardians Uxie, Mesprit, and Azelf. Its 123-card checklist is capped
  by a single secret rare, Time-Space Distortion, numbered 124/123.
