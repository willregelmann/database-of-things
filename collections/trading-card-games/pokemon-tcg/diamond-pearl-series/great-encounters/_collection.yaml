description: >
  The fourth main expansion of the Pokémon Trading Card Game's Diamond &
  Pearl Series, released in English on February 13, 2008. Centers on the
  Sinnoh region's legendary trio -- Dialga, Palkia, and Darkrai -- adding
  four Rare Holo LV.X cards (Cresselia, Darkrai, Dialga, and Palkia) and
  three theme decks: Eternal Time, Infinite Space, and Endless Night. Spans
  106 cards.
