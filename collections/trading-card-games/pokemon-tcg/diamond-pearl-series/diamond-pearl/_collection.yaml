description: >
  The first expansion of the Diamond & Pearl Series, released in English in May
  2007 by The Pokémon Company International. Marked the debut of Generation IV
  Pokémon from the Sinnoh region in the TCG, led by cover legendaries Dialga and
  Palkia, and introduced the Pokémon LV.X mechanic along with a redesigned card
  layout and separated Trainer/Supporter/Stadium card types. Spans 130 cards.
