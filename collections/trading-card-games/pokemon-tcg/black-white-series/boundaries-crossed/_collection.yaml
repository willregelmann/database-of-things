description: >
  The seventh expansion of the Black & White Series, released in English on
  November 7, 2012, drawing on Pokémon Black 2 and White 2 for its Generation V
  roster, including Black Kyurem-EX and White Kyurem-EX. Introduced the ACE SPEC
  card classification — powerful Item and Pokémon Tool cards restricted to one
  per deck — and closed out its 149-card printed set with 4 secret rares in
  golden holofoil.
