name: Next Destinies
type: collection
category: Trading Card Games
description: >
  The fourth expansion of the Black & White Series, released in the English
  Pokémon Trading Card Game on February 8, 2012. It introduced the Pokémon-EX
  mechanic to the Black & White era — powerful Basic Pokémon that give up two
  Prize cards when knocked out, including Reshiram-EX, Zekrom-EX, Kyurem-EX,
  Mewtwo-EX, Shaymin-EX, and Regigigas-EX in both regular and Full Art
  printings. Spans 99 numbered cards plus 4 Shiny Pokémon secret rares.
