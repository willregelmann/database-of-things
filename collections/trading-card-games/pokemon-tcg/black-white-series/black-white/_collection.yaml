name: Black & White
type: collection
category: Trading Card Games
description: >
  The debut expansion of the Pokémon Trading Card Game's Black & White Series,
  released on April 25, 2011, and the first English-language set built around
  Generation V's Unova region. It introduced a redesigned card frame that set
  the visual template for the rest of the series, and closes out with full-art
  Rare Ultra treatments of cover legendaries Reshiram and Zekrom plus a Rare
  Secret Pikachu.
year: 2011
