category: Trading Card Games
description: >
  The eighth and final expansion of the Pokémon Trading Card Game's Black &
  White Series, released in English on August 15, 2012. It introduced six new
  Pokémon-EX based on Legendary and Mythical Pokémon (Ho-Oh, Mew, Terrakion,
  Registeel, Rayquaza, and Giratina) alongside Blend Energy cards, and closed
  with a set of Dragon-type secret rares led by Rayquaza.
