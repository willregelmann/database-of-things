name: Black & White Series
type: collection
category: Trading Card Games
description: >
  Released alongside the Pokémon Black and White games (Generation V,
  Unova region), introducing the modern Pokémon-EX mechanic (a new
  incarnation distinct from the 2003-2007 Pokémon-ex line) and the
  full-art "Ultra Rare" treatment. Spans Black & White through Legendary
  Treasures (2011-2013), 12 expansions plus the BW Black Star Promos line.
