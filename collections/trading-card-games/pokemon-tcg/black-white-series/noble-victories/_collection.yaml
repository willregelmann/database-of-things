name: Noble Victories
type: collection
category: Trading Card Games
description: >
  The third expansion of the Black & White Series, released in the English
  Pokémon Trading Card Game on November 16, 2011, corresponding to the
  Japanese "Red Collection" set. Introduced the Restored Pokémon mechanic
  (played via Fossil cards) and centers on Generation V Pokémon, headlined
  by Victini and the Legendary Pokémon Kyurem, Terrakion, Landorus, and
  Cobalion, plus a notable Meowth secret rare.
date: "2011-11-16"
