name: Plasma Freeze
type: collection
category: Trading Card Games
description: >
  The ninth main expansion of the Black & White Series, released in English on
  May 8, 2013, corresponding to the Japanese "Spiral Force" and "Thunder
  Knuckle" sets. Draws on Pokémon Black 2 and White 2's Generation V roster
  and Team Plasma's storyline, adding a wave of Pokémon-EX (Heatran-EX,
  Thundurus-EX, Deoxys-EX, Latias-EX, Latios-EX, Tornadus-EX) alongside their
  full-art Ultra Rare reprints and ACE SPEC cards, and closing out its
  116-card printed set with 6 secret rares.
year: 2013
total_cards: 116
