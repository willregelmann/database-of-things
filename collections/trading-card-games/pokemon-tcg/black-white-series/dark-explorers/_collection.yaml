description: >
  The fifth main expansion of the Black & White Series, released in English on
  May 9, 2012, corresponding to the Japanese "Dark Rush" set. Spans 108 numbered
  cards plus 3 secret rares and is best known for introducing Darkrai-EX and a
  lineup of Darkness-type Pokémon like Zoroark, Umbreon, and Sableye, as well as
  reintroducing the tournament staple Pokémon Catcher.
