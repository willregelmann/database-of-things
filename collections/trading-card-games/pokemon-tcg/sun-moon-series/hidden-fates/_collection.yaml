name: Hidden Fates
type: collection
category: Trading Card Games
description: >
  A special Sun & Moon-era Pokémon Trading Card Game expansion released in
  English on August 23, 2019, sold through blister packs and tins rather than
  traditional booster boxes. Its 68-card main checklist spotlights fan-favorite
  Pokémon and the first TAG TEAM trio card, Moltres & Zapdos & Articuno-GX,
  while the bundled Shiny Vault subset adds a 94-card secret chase list of
  Shiny-form Pokémon and Pokémon-GX reprinted with embossed holofoil treatment.
year: 2019
