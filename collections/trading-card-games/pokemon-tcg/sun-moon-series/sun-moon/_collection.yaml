id: bb448dde-aaf1-41db-bc4a-7f8b1ebd217f
name: Sun & Moon
type: collection
category: Trading Card Games
description: >
  The debut expansion of the Pokémon Trading Card Game's Sun & Moon Series,
  released in English on February 3, 2017, alongside the Sun & Moon video games.
  Built around newly discovered Generation VII Pokémon from the Alola region, it
  introduced the Pokémon-GX mechanic — more powerful Pokémon that grant an
  opponent two Prize cards when knocked out and can use one especially strong GX
  attack per game. Spans 149 numbered cards plus a run of secret rares (full-art
  Ultra Rares, Rainbow Rares, and secret-rare Trainers/Energy) extending the
  checklist beyond the printed total.
date: "2017-02-03"
