id: 5935dc28-1664-4fa9-88e6-10a3ae4d4def
name: Shining Legends
type: collection
category: Trading Card Games
description: >
  A special 73-card expansion in the Sun & Moon Series, released in the United
  States on October 6, 2017. It revived the vintage "Shining" card style
  originally introduced in the Neo era, where only the Pokémon illustration
  itself is rendered in textured holofoil against a non-holo background.
  Unlike mainline sets, its booster packs weren't sold individually or in
  booster boxes, instead bundled exclusively into special collection products
  like Elite Trainer Boxes and Pin Collections.
year: 2017
total_cards: 73
