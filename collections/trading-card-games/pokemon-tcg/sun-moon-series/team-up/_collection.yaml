name: Team Up
type: collection
category: Trading Card Games
description: >
  The ninth main expansion of the Sun & Moon Series, released February 1, 2019.
  Team Up popularized the "Tag Team-GX" mechanic, pairing two Pokémon on a
  single powerful card (e.g. Pikachu & Zekrom-GX, Celebi & Venusaur-GX), and
  spans 181 cards plus a run of secret rares including Rainbow Rare and Full Art
  Ultra Rare reprints of its Tag Team GX Pokémon.
