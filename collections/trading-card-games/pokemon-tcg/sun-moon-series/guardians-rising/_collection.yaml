name: Guardians Rising
type: collection
category: Trading Card Games
description: >
  The second main expansion of the Pokémon Trading Card Game's Sun & Moon
  Series, released in English on May 5, 2017. Built around Alola-region
  Pokémon and their guardian deities, it introduced the Rainbow Rare
  treatment for Pokémon-GX cards as a new secret-rare variant, joining the
  145 numbered cards with a run of secret rares extending the checklist
  beyond the printed total.
