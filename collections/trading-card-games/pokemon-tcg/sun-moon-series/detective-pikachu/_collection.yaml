name: Detective Pikachu
type: collection
category: Trading Card Games
description: >
  An 18-card Pokémon Trading Card Game expansion released on April 5, 2019,
  tying in with the Warner Bros. live-action film Pokémon Detective Pikachu.
  Uniquely for the TCG, its artwork was sourced directly from the film's CGI
  renders, created by visual effects studios MPC Film and Framestore rather
  than traditional card illustrators.
year: 2019
