description: >
  The fourth main expansion of the Sun & Moon Series, released in English on
  November 3, 2017. Introduced Ultra Beasts to the Pokémon TCG as a wave of
  Pokémon-GX cards -- Nihilego-GX, Buzzwole-GX, Guzzlord-GX, and Kartana-GX --
  alongside GX cards for Silvally and Alolan Exeggutor. Spans 111 numbered
  cards plus a run of secret rares reaching 124.
