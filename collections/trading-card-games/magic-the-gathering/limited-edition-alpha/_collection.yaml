id: 78ceac4d-8076-424a-9424-f79f711ddd6e
name: Limited Edition Alpha
type: collection
category: Trading Card Games
description: >
  The first Magic: The Gathering set, released August 5, 1993, sold through
  hobby and game distributors. Established the game's original 295-card pool
  across all five colors, artifacts, and basic lands. Cards from this printing
  carry no expansion symbol — that convention began later — and are identified
  here by the collector number assigned by Scryfall/the wider hobby, since none
  was printed on the card itself.
date: "1993-08-05"
total_cards: 295
