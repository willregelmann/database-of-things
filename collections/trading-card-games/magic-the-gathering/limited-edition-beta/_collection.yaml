id: 481b6dd9-399a-45d7-8dab-8a4b2e014c73
name: Limited Edition Beta
type: collection
category: Trading Card Games
description: >
  The second Magic: The Gathering set, released October 4, 1993 — a
  corrected reprint of Limited Edition Alpha that fixed rules text and
  templating issues, expanded the basic land art rotation, and grew the
  checklist to 302 cards. Like Alpha, cards carry no expansion symbol and
  are identified here by the collector number assigned by Scryfall/the
  wider hobby, since none was printed on the card itself.
date: "1993-10-04"
total_cards: 302
