id: 752b8d69-4cb8-4612-ae00-8d8986ffc9b8
type: collection
name: Unlimited Edition
date: '1993-12-01'
description: >
  The third Magic: The Gathering set, released December 1, 1993. Reused Limited
  Edition Beta's 302-card checklist and rulebook unchanged, right down to its
  misprints, but switched the card frame from Alpha/Beta's black border to white
  — a deliberate change by Wizards of the Coast to preserve the collectible
  value of the original black-bordered print runs. Like Alpha and Beta, cards
  carry no expansion symbol and are identified here by the collector number
  assigned by Scryfall/the wider hobby.
category: Trading Card Games
total_cards: 302
