description: >
  Bandai's Gundam plastic model kits, sold under official grades (PG, MG, RG,
  HG, SD, EG) that fix scale and build complexity. Each grade — and, for HG,
  each timeline-specific numbering sub-line within it — is its own nested
  collection.
