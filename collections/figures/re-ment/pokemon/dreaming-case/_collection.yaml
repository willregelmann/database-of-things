name: Dreaming Case
type: collection
description: >
  Sleeping-Pokémon diorama blind-box line, each figure a small chest with a
  snoozing Pokémon inside that can be removed and used as a container. The first
  two volumes centered on Eevee and its evolutions; later volumes broadened to
  other species and dropped the Eevee branding entirely.
