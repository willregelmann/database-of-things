version: '3.8'

services:
  embedding-worker:
    build:
      context: ./services/embedding-worker
      dockerfile: Dockerfile
    container_name: embedding_worker_database_of_things
    environment:
      # Database connection - adjust for your environment
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}

      # Worker configuration
      MODEL_NAME: ${MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      BATCH_SIZE: ${BATCH_SIZE:-100}
      POLL_INTERVAL: ${POLL_INTERVAL:-10}
      WORKER_ID: ${WORKER_ID:-worker-1}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONUNBUFFERED: 1

      # Resource limits (optional)
      OMP_NUM_THREADS: 4  # Limit OpenMP threads
      MKL_NUM_THREADS: 4  # Limit MKL threads

    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Volumes for persistent logs
    volumes:
      - ./logs/embedding-worker:/app/logs
      # Cache models to avoid re-downloading
      - embedding-model-cache:/home/worker/.cache

    # Use same network as Supabase for local development
    networks:
      - supabase_network_database-of-things

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncpg; import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Multiple workers for scaling
  # embedding-worker-2:
  #   extends: embedding-worker
  #   container_name: embedding_worker_2_database_of_things
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
  #     WORKER_ID: worker-2
  #     # Inherit other env vars from .env

volumes:
  embedding-model-cache:
    driver: local

networks:
  supabase_network_database-of-things:
    external: true